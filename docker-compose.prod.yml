version: '3.8'

services:
  nsfwbot:
    build: .
    container_name: nsfwbot_prod
    ports:
      - "5000:5000"
    volumes:
      - bot_data:/app/data        # Named volume for better management
      - bot_logs:/app/logs        # Named volume for logs
    environment:
      - DATABASE_PATH=/app/data/bot_database.db
      - FLASK_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - AI_API_KEY=${AI_API_KEY}
      - VENICE_INFERENCE_KEY=${VENICE_INFERENCE_KEY}
      - TON_WALLET=${TON_WALLET}
    env_file:
      - .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s

  # Optional: Add nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: nsfwbot_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - nsfwbot
    restart: unless-stopped

volumes:
  bot_data:
    driver: local
  bot_logs:
    driver: local

networks:
  default:
    name: nsfwbot_prod_network