version: '3.8'

services:
  nsfwbot:
    build: .
    container_name: nsfwbot
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data          # Persist SQLite database
      - ./logs:/app/logs          # Persist application logs
    environment:
      - DATABASE_PATH=/app/data/bot_database.db
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - AI_API_KEY=${AI_API_KEY}
      - VENICE_INFERENCE_KEY=${VENICE_INFERENCE_KEY}
      - TON_WALLET=${TON_WALLET}
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: nsfwbot_network